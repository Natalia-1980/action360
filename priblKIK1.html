<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>КИК: платить или освободить?</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #eef2f5;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }
    .container {
      max-width: 780px;
      width: 100%;
      background: #ffffff;
      border-radius: 24px;
      padding: 0.9rem;
      box-shadow: 0 15px 25px -12px rgba(0,0,0,0.1);
      border: 1px solid #d0d7de;
      max-height: 580px;
      height: 580px;
      display: flex;
      flex-direction: column;
    }
    h1 {
      font-weight: 600;
      font-size: 1.4rem;
      color: #1e2b39;
      margin-bottom: 0.1rem;
      line-height: 1.1;
    }
    .sub {
      color: #3f4f60;
      font-size: 0.9rem;
      border-left: 4px solid #8fa5bb;
      padding-left: 0.7rem;
      background: #f2f6fb;
      border-radius: 0 16px 16px 0;
      padding: 0.2rem 0.9rem;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.7rem;
      flex: 1;
      min-height: 0;
    }
    .flip-card {
      background-color: transparent;
      height: 100%;
      min-height: 0;
      perspective: 1000px;
    }
    .flip-card.flipped .flip-inner {
      transform: rotateY(180deg);
    }
    .flip-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.4s;
      transform-style: preserve-3d;
    }
    .flip-front, .flip-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 18px;
      padding: 0.6rem;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 8px -4px rgba(0,0,0,0.1);
      border: 2px solid #d0d7de;
      overflow-y: auto;
    }
    .flip-front {
      background: #ffffff;
      color: #1f2c38;
    }
    .flip-back {
      background: #e8f0f9;
      color: #1f2c38;
      transform: rotateY(180deg);
      border-left: 4px solid #8fa5bb;
    }
    .card-title {
      font-weight: 700;
      font-size: 1rem;
      color: #1e2b39;
      margin-bottom: 0.1rem;
      padding-bottom: 0.1rem;
      border-bottom: 1px solid #e0e8f2;
    }
    .card-question {
      font-size: 0.9rem;
      color: #2b4050;
      margin-bottom: 0.3rem;
      line-height: 1.2;
      flex-grow: 1;
    }
    .card-answer-text {
      font-size: 0.9rem;
      line-height: 1.2;
      color: #1f2c38;
      margin-bottom: 0.2rem;
    }
    .card-buttons {
      display: flex;
      gap: 0.4rem;
      justify-content: space-between;
      margin-top: 0.1rem;
    }
    .btn-answer {
      flex: 1;
      padding: 0.3rem 0.2rem;
      border: 2px solid #6b7b8c;
      border-radius: 22px;
      background: #d1dbe5;
      color: #1f2c38;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.1s;
      text-align: center;
      line-height: 1.1;
    }
    .btn-answer:hover {
      background: #b8c5d2;
    }
    .btn-answer.selected {
      opacity: 0.6;
      cursor: default;
      pointer-events: none;
    }
    .flip-card.correct .flip-front {
      border: 4px solid #2e7d5e;
      background: #f0f9f2;
    }
    .flip-card.incorrect .flip-front {
      border: 4px solid #b33c3c;
      background: #fef0f0;
    }
    .reset-btn {
      background: #8fa5bb;
      border: none;
      border-radius: 30px;
      padding: 0.4rem 1.2rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: white;
      cursor: pointer;
      transition: 0.1s;
      margin: 0.4rem auto 0.2rem;
      display: block;
      width: fit-content;
    }
    .reset-btn:hover {
      background: #728da8;
    }
    hr {
      border: 1px solid #cbd5e1;
      margin: 0.2rem 0 0.1rem;
    }
    .footer {
      text-align: center;
      color: #5f7485;
      font-size: 0.7rem;
      line-height: 1;
    }
    .hint {
      font-size: 0.7rem;
      color: #5f7485;
      margin-top: 0.1rem;
      font-style: italic;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>КИК: платить или освободить?</h1>
  <div class="sub">Выберите "Платить" или "Не платить". Ответ — на обратной стороне.</div>

  <div class="cards-grid" id="cardsContainer"></div>

  <button class="reset-btn" id="resetBtn">Начать заново</button>

  <hr>
  <div class="footer">глава 3.4 НК · освобождение от налога на прибыль КИК</div>
</div>

<script>
  (function() {
    const cardsData = [
      {
        title: 'КИК в ЕАЭС',
        question: 'КИК зарегистрирована в Казахстане, ведет производственную деятельность. Контролирующее лицо — российская компания. Будет ли российская компания платить налог с прибыли КИК?',
        answer: 'Прибыль освобождается от налога на прибыль, так как КИК зарегистрирована в ЕАЭС и является активной компанией.',
        shouldPay: false
      },
      {
        title: 'КИК в оффшоре',
        question: 'КИК зарегистрирована на Кипре, эффективная ставка налога — 12,5 %. Контролирующее лицо — российская компания. Будет ли российская компания платить налог с прибыли КИК?',
        answer: 'Будет платить, так как эффективная ставка для КИК на Кипре менее 75% от российской ставки налога на прибыль.',
        shouldPay: true
      },
      {
        title: 'КИК–холдинг',
        question: 'КИК — холдинговая компания, владеет долями в операционных компаниях. Контролирующее лицо — российская компания. Будет ли российская компания платить налог с прибыли КИК?',
        answer: 'Прибыль освобождается от налогообложения, так как КИК — активная компания.',
        shouldPay: false
      },
      {
        title: 'КИК в ОАЭ',
        question: 'КИК зарегистрирована в ОАЭ, ставка корпоративного налога — 0%, компания получает доход только в виде дивидендов, платежи за передачу прав по лицензии. Будет ли российская компания платить налог с прибыли КИК?',
        answer: 'КИК — не активная компания, получает только пассивный доход. Контролирующее лицо будет уплачивать налог с прибыли КИК.',
        shouldPay: true
      }
    ];

    const container = document.getElementById('cardsContainer');
    const resetBtn = document.getElementById('resetBtn');

    let userAnswers = new Array(cardsData.length).fill(null);

    function renderCards() {
      container.innerHTML = '';
      
      cardsData.forEach((card, index) => {
        const flipCard = document.createElement('div');
        flipCard.className = 'flip-card';
        flipCard.dataset.index = index;
        if (userAnswers[index] !== null) {
          flipCard.classList.add(userAnswers[index] === card.shouldPay ? 'correct' : 'incorrect');
        }

        const inner = document.createElement('div');
        inner.className = 'flip-inner';

        // Передняя сторона (вопрос)
        const front = document.createElement('div');
        front.className = 'flip-front';

        const title = document.createElement('div');
        title.className = 'card-title';
        title.textContent = card.title;
        front.appendChild(title);

        const question = document.createElement('div');
        question.className = 'card-question';
        question.textContent = card.question;
        front.appendChild(question);

        // Кнопки Платить / Не платить
        const btnGroup = document.createElement('div');
        btnGroup.className = 'card-buttons';

        const payBtn = document.createElement('div');
        payBtn.className = 'btn-answer';
        payBtn.textContent = 'Платить';
        payBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          handleAnswer(index, true, flipCard);
        });

        const freeBtn = document.createElement('div');
        freeBtn.className = 'btn-answer';
        freeBtn.textContent = 'Не платить';
        freeBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          handleAnswer(index, false, flipCard);
        });

        btnGroup.appendChild(payBtn);
        btnGroup.appendChild(freeBtn);
        front.appendChild(btnGroup);

        const hint = document.createElement('div');
        hint.className = 'hint';
        hint.textContent = 'После ответа карточка перевернется';
        front.appendChild(hint);

        // Задняя сторона (ответ)
        const back = document.createElement('div');
        back.className = 'flip-back';

        const backTitle = document.createElement('div');
        backTitle.className = 'card-title';
        backTitle.textContent = 'Правильный ответ';
        back.appendChild(backTitle);

        const answerText = document.createElement('div');
        answerText.className = 'card-answer-text';
        answerText.textContent = card.answer;
        back.appendChild(answerText);

        const hint2 = document.createElement('div');
        hint2.className = 'hint';
        hint2.textContent = 'Кликните, чтобы вернуться';
        back.appendChild(hint2);

        inner.appendChild(front);
        inner.appendChild(back);
        flipCard.appendChild(inner);

        // Клик для обратного переворота (только если уже отвечали)
        flipCard.addEventListener('click', function(e) {
          if (e.target.classList.contains('btn-answer')) return;
          if (userAnswers[index] !== null) {
            this.classList.toggle('flipped');
          }
        });

        container.appendChild(flipCard);
      });
    }

    function handleAnswer(index, answer, flipCard) {
      if (userAnswers[index] !== null) return;

      const card = cardsData[index];
      const isCorrect = (answer === card.shouldPay);
      
      userAnswers[index] = answer;

      flipCard.classList.remove('correct', 'incorrect');
      flipCard.classList.add(isCorrect ? 'correct' : 'incorrect');
      
      const buttons = flipCard.querySelectorAll('.btn-answer');
      buttons.forEach(btn => {
        btn.style.pointerEvents = 'none';
        btn.classList.add('selected');
      });

      flipCard.classList.add('flipped');

      if (userAnswers.every(ans => ans !== null)) {
        const correctCount = userAnswers.reduce((acc, ans, idx) => acc + (ans === cardsData[idx].shouldPay ? 1 : 0), 0);
        setTimeout(() => {
          alert(`Все карточки отвечены! Правильных ответов: ${correctCount} из ${cardsData.length}`);
        }, 100);
      }
    }

    function resetAll() {
      userAnswers = new Array(cardsData.length).fill(null);
      renderCards();
    }

    resetBtn.addEventListener('click', resetAll);

    renderCards();
  })();
</script>
</body>
</html>
