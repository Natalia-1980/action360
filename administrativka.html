<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Административная ответственность</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #eef2f5;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .frame {
      max-width: 1000px;
      width: 100%;
      height: 920px;
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 20px 30px -15px rgba(0, 0, 0, 0.15);
      border: 1px solid #d0d7de;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header-area {
      padding: 1.5rem 1.8rem 0.5rem 1.8rem;
      flex-shrink: 0;
    }

    h1 {
      font-weight: 600;
      font-size: 1.9rem;
      color: #1e2b39;
      margin-bottom: 0.2rem;
      line-height: 1.2;
    }

    .sub {
      color: #3f4f60;
      font-size: 1.1rem;
      border-left: 5px solid #8fa5bb;
      padding-left: 1rem;
      background: #f2f6fb;
      border-radius: 0 20px 20px 0;
      padding: 0.6rem 1.2rem;
      line-height: 1.4;
    }

    .cards-scroll-area {
      flex: 1;
      padding: 0.8rem 1.8rem 0.5rem 1.8rem;
      overflow-y: auto;
      min-height: 0;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }

    .flip-card {
      background-color: transparent;
      height: 380px;
      perspective: 1500px;
    }

    .flip-card.flipped .flip-inner {
      transform: rotateY(180deg);
    }

    .flip-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s;
      transform-style: preserve-3d;
    }

    .flip-front, .flip-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 24px;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      box-shadow: 0 6px 14px -8px rgba(0, 0, 0, 0.15);
      border: 2px solid #d0d7de;
      background: #ffffff;
    }

    .flip-back {
      background: #e8f0f9;
      transform: rotateY(180deg);
      border-left: 5px solid #8fa5bb;
    }

    .card-question {
      font-size: 1rem;
      line-height: 1.4;
      margin-bottom: 0.8rem;
      color: #2b4050;
      font-weight: 450;
      height: 90px;
      overflow: hidden;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex: 1;
    }

    .option-btn {
      background: #edf2f7;
      border: 2px solid #8fa5bb;
      border-radius: 40px;
      padding: 0.7rem 0.9rem;
      font-weight: 500;
      font-size: 0.9rem;
      color: #1f2c38;
      cursor: pointer;
      transition: 0.1s;
      text-align: left;
      line-height: 1.3;
      width: 100%;
      word-break: break-word;
    }

    .option-btn.selected {
      background: #8fa5bb;
      color: white;
      border-color: #2b4050;
    }

    .option-btn:hover:not(.selected) {
      background: #dbe2ec;
    }

    .flip-back p {
      font-size: 0.95rem;
      line-height: 1.5;
      color: #1f2c38;
      margin-bottom: 0.5rem;
    }

    .hint {
      font-size: 0.8rem;
      color: #6f8a9f;
      margin-top: 0.3rem;
      font-style: italic;
    }

    .footer-actions {
      padding: 0.8rem 1.8rem 1.2rem 1.8rem;
      flex-shrink: 0;
      background: white;
      border-top: 1px solid #e2e8f0;
    }

    .summary {
      background: #eef2f6;
      border-radius: 30px;
      padding: 0.9rem 1.5rem;
      font-size: 1rem;
      color: #1f2c38;
      border: 1px solid #c2d1e2;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    hr {
      border: 1px solid #cbd5e1;
      margin: 0.5rem 0 0;
    }

    .footer-note {
      text-align: center;
      color: #5f7485;
      font-size: 0.8rem;
      padding-top: 0.3rem;
    }
  </style>
</head>
<body>
<div class="frame">
  <div class="header-area">
    <h1>Административная ответственность</h1>
    <div class="sub">Директор и главбух: выберите статью</div>
  </div>

  <div class="cards-scroll-area">
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

  <div class="footer-actions">
    <div class="summary" id="summary">Выберите ответы на всех карточках</div>
    <hr>
    <div class="footer-note">ст. 15.3–15.33 КоАП РФ</div>
  </div>
</div>

<script>
  (function () {
    const cardsData = [
      {
        question: 'Главный бухгалтер ООО «Альфа» подал налоговую декларацию на 5 дней позже установленного срока. Организация налог уплатила вовремя. По какой статье главбуха могут привлечь к административке?',
        options: [
          'по ст. 15.3 КоАП за нарушение срока постановки на учет',
          'по ст. 15.5 КоАП за нарушение сдачи декларации',
          'по ст. 15.6 КоАП за непредставление сведений'
        ],
        correct: 'по ст. 15.5 КоАП за нарушение сдачи декларации',
        backText: 'За нарушение сроков сдачи налоговой декларации главбуха могут оштрафовать на 300–500 рублей по ст. 15.5 КоАП.'
      },
      {
        question: 'ООО «Бета» начало вести деятельность, но руководитель организации подал заявление о постановке на учет только через месяц после начала работы. Привлекут ли руководителя к административке?',
        options: [
          'Да, по ч. 2 ст. 15.3 КоАП за нарушение срока с ведением деятельности без постановки на учет',
          'Да, по ст. 15.5 КоАП за нарушение срока сдачи декларации',
          'Да, по ст. 15.11 КоАП за грубое нарушение бухучета'
        ],
        correct: 'Да, по ч. 2 ст. 15.3 КоАП за нарушение срока с ведением деятельности без постановки на учет',
        backText: 'Если руководитель нарушил срок подачи заявления о постановке на учет, налоговики применяют ст. 15.3 КоАП, оштрафуют руководителя максимум на 3 000 рублей.'
      },
      {
        question: 'ООО «Гамма» отразило в отчетности сделки с "бумажным вычетом" НДС. Организация занизила налог на 10 процентов. Привлекут ли руководителя к административной ответственности?',
        options: [
          'Нет, привлекут только компанию к уголовной ответственности',
          'Да, привлекут по ст.15.11 КоАП за грубое нарушение бухучета',
          'Да, привлекут по ст.15.6 за искажение сведений для налогового контроля'
        ],
        correct: 'Да, привлекут по ст.15.11 КоАП за грубое нарушение бухучета',
        backText: 'Организацию привлекут к налоговой ответственности за неуплату налога, но это не исключает административную ответственность руководителя. Его оштрафуют по ст. 15.11 КоАП максимум на 10 000 рублей.'
      },
      {
        question: 'ООО «Дельта» не представила в налоговую документы по требованию в ходе проверки. На сколько оштрафуют руководителя?',
        options: [
          'На 500 рублей по ст. 15.6 КоАП',
          'На 2000 рублей по ч. 1 ст. 15.33 КоАП',
          'На 10000 рублей по ст. 15.11 КоАП'
        ],
        correct: 'На 500 рублей по ст. 15.6 КоАП',
        backText: 'Руководителя оштрафуют на 500 рублей по ст. 15.6 КоАП за непредставление сведений для налогового контроля.'
      }
    ];

    const grid = document.getElementById('cardsGrid');
    const summaryEl = document.getElementById('summary');

    let userAnswers = new Array(cardsData.length).fill(null);
    let cardsFlipped = new Array(cardsData.length).fill(false);

    function updateSummary() {
      const allAnswered = userAnswers.every(ans => ans !== null);
      if (!allAnswered) {
        const answeredCount = userAnswers.filter(ans => ans !== null).length;
        summaryEl.innerHTML = `📌 Отвечено ${answeredCount} из ${cardsData.length} карточек`;
        return;
      }

      const correctCount = userAnswers.reduce((acc, ans, idx) => {
        return acc + (ans === cardsData[idx].correct ? 1 : 0);
      }, 0);
      summaryEl.innerHTML = `🎯 Результат: правильно ${correctCount} из ${cardsData.length}`;
    }

    function renderCards() {
      grid.innerHTML = '';
      cardsData.forEach((card, index) => {
        const flipCard = document.createElement('div');
        flipCard.className = 'flip-card';
        flipCard.dataset.index = index;

        const inner = document.createElement('div');
        inner.className = 'flip-inner';

        const front = document.createElement('div');
        front.className = 'flip-front';

        const question = document.createElement('div');
        question.className = 'card-question';
        question.textContent = card.question;
        front.appendChild(question);

        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'options';

        card.options.forEach((opt) => {
          const btn = document.createElement('div');
          btn.className = 'option-btn';
          btn.textContent = opt;

          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (cardsFlipped[index]) return;

            optionsDiv.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            userAnswers[index] = opt;
            updateSummary();

            setTimeout(() => {
              if (!cardsFlipped[index]) {
                flipCard.classList.add('flipped');
                cardsFlipped[index] = true;
              }
            }, 120);
          });

          optionsDiv.appendChild(btn);
        });
        front.appendChild(optionsDiv);

        const hint = document.createElement('div');
        hint.className = 'hint';
        hint.textContent = '✅ После ответа карточка перевернётся';
        front.appendChild(hint);

        const back = document.createElement('div');
        back.className = 'flip-back';

        const backTitle = document.createElement('p');
        backTitle.style.fontWeight = '600';
        backTitle.style.marginBottom = '0.7rem';
        backTitle.textContent = 'Правильный ответ:';
        back.appendChild(backTitle);

        const backText = document.createElement('p');
        backText.textContent = card.backText;
        back.appendChild(backText);

        const backHint = document.createElement('div');
        backHint.className = 'hint';
        backHint.textContent = '🔁 Кликните, чтобы вернуться';
        back.appendChild(backHint);

        inner.appendChild(front);
        inner.appendChild(back);
        flipCard.appendChild(inner);

        flipCard.addEventListener('click', (e) => {
          if (e.target.classList.contains('option-btn')) return;
          if (cardsFlipped[index]) {
            flipCard.classList.remove('flipped');
            cardsFlipped[index] = false;
          } else if (userAnswers[index] !== null) {
            flipCard.classList.add('flipped');
            cardsFlipped[index] = true;
          }
        });

        grid.appendChild(flipCard);
      });
    }

    renderCards();
    updateSummary();
  })();
</script>
</body>
</html>
