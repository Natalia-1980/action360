<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Сроки подачи уведомлений о КИК</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #eef2f5;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }
    .card {
      max-width: 550px;
      width: 100%;
      background: #ffffff;
      border-radius: 28px;
      padding: 1.2rem 1rem;
      box-shadow: 0 15px 25px -12px rgba(0,0,0,0.1);
      border: 1px solid #d0d7de;
    }
    h1 {
      font-weight: 600;
      font-size: 1.3rem;
      color: #1e2b39;
      margin-bottom: 0.1rem;
      line-height: 1.1;
    }
    .sub {
      color: #3f4f60;
      font-size: 0.85rem;
      border-left: 4px solid #8fa5bb;
      padding-left: 0.6rem;
      background: #f2f6fb;
      border-radius: 0 16px 16px 0;
      padding: 0.3rem 0.8rem;
      margin-bottom: 0.8rem;
      line-height: 1.2;
    }
    .table-container {
      background: #f8fafc;
      border-radius: 20px;
      padding: 0.6rem;
      border: 1px solid #cbd5e1;
      margin-bottom: 1rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }
    th {
      background: #e0e8f2;
      font-weight: 600;
      color: #2b4050;
      padding: 0.6rem 0.3rem;
      border-radius: 14px 14px 0 0;
    }
    td {
      padding: 0.5rem 0.3rem;
      border-bottom: 1px solid #d2dbe5;
      text-align: left;
    }
    .label-cell {
      font-weight: 500;
      color: #1f2c38;
      padding-left: 0.5rem;
    }
    .dropzone {
      background: #ffffff;
      border: 2px dashed #9aa9b7;
      border-radius: 25px;
      padding: 0.5rem 0.8rem;
      min-height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      color: #5f7485;
      transition: 0.1s;
      font-size: 0.9rem;
    }
    .dropzone.filled {
      border: 2px solid #6b7b8c;
      background: #d1dbe5;
      color: #1f2c38;
      font-weight: 600;
    }
    .dropzone.drag-over {
      border-color: #1f4f3d;
      background: #dee9f2;
    }
    .dropzone.correct-check {
      border: 3px solid #2e7d5e;
      background: #d0ecdf;
      font-weight: 700;
    }
    .dropzone.incorrect-check {
      border: 3px solid #b33c3c;
      background: #f9dcdc;
      font-weight: 700;
    }
    .options-panel {
      background: #edf2f7;
      border-radius: 20px;
      padding: 1rem 0.8rem;
      border: 1px solid #cbd5e1;
    }
    .options-panel h3 {
      font-weight: 600;
      font-size: 0.95rem;
      color: #2b4050;
      border-bottom: 1px dashed #9aa9b7;
      padding-bottom: 0.3rem;
      margin-bottom: 0.7rem;
    }
    .draggable-items {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .drag-item {
      background: #ffffff;
      border-radius: 30px;
      padding: 0.5rem 1.2rem;
      border: 2px solid #8fa5bb;
      color: #1f2c38;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: grab;
      box-shadow: 0 3px 6px -3px #7f8c9a;
      transition: 0.1s;
      user-select: none;
    }
    .drag-item:active {
      cursor: grabbing;
      opacity: 0.7;
    }
    .drag-item.dragging {
      opacity: 0.3;
    }
    .drag-item.placed {
      background: #d1dbe5;
      border: 2px solid #6b7b8c;
      cursor: default;
      opacity: 0.5;
      pointer-events: none;
    }
    .feedback-area {
      margin-top: 1rem;
    }
    .message {
      background: #eef2f6;
      border-radius: 25px;
      padding: 0.6rem 1.2rem;
      font-size: 0.85rem;
      color: #1f2c38;
      border: 1px solid #c2d1e2;
      min-height: 3rem;
    }
    .actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 1rem;
    }
    .btn {
      background: #d0dbe8;
      border: none;
      border-radius: 35px;
      padding: 0.5rem 1.6rem;
      font-weight: 600;
      font-size: 0.85rem;
      color: #1f2c38;
      border: 1px solid #b3c3d6;
      cursor: pointer;
      transition: 0.1s;
    }
    .btn-primary {
      background: #8fa5bb;
      color: white;
    }
    .btn-primary:hover { background: #728da8; }
    .btn:hover { background: #c2d0e0; }
    hr {
      border: 1px solid #cbd5e1;
      margin: 1rem 0 0.1rem;
    }
    .footer-note {
      text-align: center;
      color: #5f7485;
      font-size: 0.7rem;
      line-height: 1;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>Сроки подачи уведомлений о КИК</h1>
  <div class="sub">Перетащите правильные сроки в пустые ячейки таблицы</div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Кто подает</th>
          <th>Крайний срок</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="label-cell">Организация</td>
          <td>
            <div class="dropzone" id="drop-org" data-expected="20 марта"></div>
          </td>
        </tr>
        <tr>
          <td class="label-cell">Физическое лицо</td>
          <td>
            <div class="dropzone" id="drop-individual" data-expected="30 апреля"></div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="options-panel">
    <h3>Перетащите нужные даты</h3>
    <div class="draggable-items" id="draggableContainer">
      <div class="drag-item" draggable="true" data-value="20 марта" id="date1">20 марта</div>
      <div class="drag-item" draggable="true" data-value="30 апреля" id="date2">30 апреля</div>
      <div class="drag-item" draggable="true" data-value="1 мая" id="date3">1 мая</div>
      <div class="drag-item" draggable="true" data-value="31 декабря" id="date4">31 декабря</div>
    </div>
  </div>

  <div class="feedback-area">
    <div class="message" id="feedbackMessage">
      ⚡ Перетащите даты в таблицу. Затем нажмите «Проверить».
    </div>
  </div>

  <div class="actions">
    <button class="btn" id="resetBtn">⟲ Сбросить</button>
    <button class="btn btn-primary" id="checkBtn">✓ Проверить</button>
  </div>

  <hr>
  <div class="footer-note">глава 3.4 НК · сроки подачи уведомлений о КИК</div>
</div>

<script>
  (function() {
    const draggables = document.querySelectorAll('.drag-item');
    const dropZones = document.querySelectorAll('.dropzone');
    const resetBtn = document.getElementById('resetBtn');
    const checkBtn = document.getElementById('checkBtn');
    const feedbackEl = document.getElementById('feedbackMessage');

    // drag start
    draggables.forEach(item => {
      item.addEventListener('dragstart', e => {
        if (item.classList.contains('placed')) {
          e.preventDefault();
          return false;
        }
        e.dataTransfer.setData('text/plain', item.getAttribute('data-value') || item.innerText);
        item.classList.add('dragging');
      });
      item.addEventListener('dragend', e => {
        item.classList.remove('dragging');
      });
    });

    // drop zones
    dropZones.forEach(zone => {
      zone.addEventListener('dragover', e => {
        e.preventDefault();
        zone.classList.add('drag-over');
      });
      zone.addEventListener('dragenter', e => {
        e.preventDefault();
        zone.classList.add('drag-over');
      });
      zone.addEventListener('dragleave', () => {
        zone.classList.remove('drag-over');
      });
      zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.classList.remove('drag-over');
        const data = e.dataTransfer.getData('text/plain');
        if (!data) return;

        if (zone.classList.contains('filled')) {
          feedbackEl.innerHTML = '⚠️ Эта ячейка уже заполнена. Сбросьте или очистите двойным кликом.';
          return;
        }

        const draggedItem = Array.from(draggables).find(
          item => item.getAttribute('data-value') === data && !item.classList.contains('placed')
        );

        if (draggedItem) {
          zone.innerText = data;
          zone.classList.add('filled');
          zone.classList.remove('correct-check', 'incorrect-check');
          draggedItem.classList.add('placed');
          draggedItem.setAttribute('draggable', 'false');
          feedbackEl.innerHTML = '✅ Дата добавлена. Продолжайте или нажмите «Проверить».';
        } else {
          feedbackEl.innerHTML = '❌ Эта дата уже использована.';
        }
      });
    });

    // двойной клик по зоне — очистка
    dropZones.forEach(zone => {
      zone.addEventListener('dblclick', function() {
        const value = this.innerText.trim();
        if (value) {
          const placedItem = Array.from(draggables).find(
            item => item.getAttribute('data-value') === value && item.classList.contains('placed')
          );
          if (placedItem) {
            placedItem.classList.remove('placed');
            placedItem.setAttribute('draggable', 'true');
          }
          this.innerText = '';
          this.classList.remove('filled', 'correct-check', 'incorrect-check');
          feedbackEl.innerHTML = '⚡ Ячейка очищена. Можно перетащить снова.';
        }
      });
    });

    // сброс
    resetBtn.addEventListener('click', () => {
      dropZones.forEach(zone => {
        zone.innerText = '';
        zone.classList.remove('filled', 'correct-check', 'incorrect-check', 'drag-over');
      });
      draggables.forEach(item => {
        item.classList.remove('placed', 'dragging');
        item.setAttribute('draggable', 'true');
      });
      feedbackEl.innerHTML = '⚡ Перетащите даты в таблицу. Затем нажмите «Проверить».';
    });

    // проверка
    checkBtn.addEventListener('click', () => {
      let correctCount = 0;
      const results = [];

      dropZones.forEach(zone => {
        const expected = zone.dataset.expected;
        const actual = zone.innerText.trim();
        const label = zone.parentElement.previousElementSibling?.innerText || 'поле';

        zone.classList.remove('correct-check', 'incorrect-check');

        if (actual === expected) {
          correctCount++;
          zone.classList.add('correct-check');
          results.push(`✅ ${label}: ${actual}`);
        } else {
          zone.classList.add('incorrect-check');
          results.push(`❌ ${label}: должно быть "${expected}"`);
        }
      });

      if (correctCount === dropZones.length) {
        feedbackEl.innerHTML = '🎉 Превосходно! Все сроки указаны верно.';
      } else {
        feedbackEl.innerHTML = results.join('<br>');
      }
    });
  })();
</script>
</body>
</html>
