<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Штрафы за отчетность</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #eef2f5;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .card {
      max-width: 700px;
      width: 100%;
      background: #ffffff;
      border-radius: 28px;
      padding: 1.5rem;
      box-shadow: 0 20px 30px -15px rgba(0,0,0,0.1);
      border: 1px solid #d0d7de;
      max-height: 800px;
      height: 800px;
      display: flex;
      flex-direction: column;
    }

    h1 {
      font-weight: 600;
      font-size: 1.5rem;
      color: #1e2b39;
      margin-bottom: 0.2rem;
      line-height: 1.2;
    }

    .sub {
      color: #3f4f60;
      font-size: 0.9rem;
      border-left: 4px solid #8fa5bb;
      padding-left: 0.8rem;
      background: #f2f6fb;
      border-radius: 0 16px 16px 0;
      padding: 0.4rem 1rem;
      margin-bottom: 1rem;
      line-height: 1.3;
    }

    .tasks-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      flex: 1;
      overflow-y: auto;
      padding-right: 0.3rem;
    }

    .task-card {
      background: #f8fafc;
      border-radius: 20px;
      padding: 1rem;
      border: 1px solid #cbd5e1;
    }

    .task-title {
      font-weight: 700;
      font-size: 1rem;
      color: #2b4050;
      margin-bottom: 0.5rem;
    }

    .task-desc {
      font-size: 0.9rem;
      color: #1f2c38;
      margin-bottom: 0.8rem;
      line-height: 1.4;
    }

    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .option-btn {
      background: #edf2f7;
      border: 2px solid #8fa5bb;
      border-radius: 30px;
      padding: 0.5rem 1rem;
      font-weight: 500;
      font-size: 0.8rem;
      color: #1f2c38;
      cursor: pointer;
      transition: 0.1s;
      text-align: left;
      line-height: 1.2;
    }

    .option-btn.selected {
      background: #8fa5bb;
      color: white;
      border-color: #2b4050;
    }

    .option-btn:hover:not(.selected) {
      background: #dbe2ec;
    }

    .feedback {
      font-size: 0.8rem;
      margin-top: 0.5rem;
      padding: 0.5rem;
      border-radius: 16px;
      min-height: 2.5rem;
      background: #f2f6fb;
      border: 1px solid #c2d1e2;
    }

    .feedback.correct {
      background: #d0ecdf;
      color: #2e7d5e;
    }

    .feedback.incorrect {
      background: #f9dcdc;
      color: #b33c3c;
    }

    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin: 1rem 0 0.5rem;
    }

    .btn {
      background: #d0dbe8;
      border: none;
      border-radius: 30px;
      padding: 0.6rem 2rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: #1f2c38;
      border: 1px solid #b3c3d6;
      cursor: pointer;
      transition: 0.1s;
    }

    .btn-primary {
      background: #8fa5bb;
      color: white;
    }

    .btn-primary:hover { background: #728da8; }
    .btn:hover { background: #c2d0e0; }

    .summary {
      background: #eef2f6;
      border-radius: 20px;
      padding: 0.7rem 1.2rem;
      font-size: 0.9rem;
      color: #1f2c38;
      border: 1px solid #c2d1e2;
      text-align: center;
    }

    hr {
      border: 1px solid #cbd5e1;
      margin: 1rem 0 0.2rem;
    }

    .footer {
      text-align: center;
      color: #5f7485;
      font-size: 0.7rem;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>Штрафы за отчетность</h1>
  <div class="sub">ст. 119 и 119.1 НК РФ: выберите правильный штраф</div>

  <div class="tasks-grid" id="tasksContainer"></div>

  <div class="actions">
    <button class="btn" id="resetBtn">⟲ Сбросить всё</button>
    <button class="btn btn-primary" id="checkBtn">✓ Проверить все</button>
  </div>

  <div class="summary" id="summary">
    Выберите ответы для всех задач
  </div>

  <hr>
  <div class="footer">ст. 119, 119.1 НК РФ · штрафы за отчетность</div>
</div>

<script>
  (function() {
    const tasks = [
      {
        title: 'Задача 1. Опоздание с декларацией (налог есть)',
        desc: 'ООО «Альфа» сдало декларацию по НДС на 2 месяца позже срока. Сумма налога к уплате — 200 000 рублей. Какой штраф заплатит компания?',
        options: [
          { text: '(200000 × 0,05) × 2 = 20000 рублей', value: '20000' },
          { text: 'Минимальный налог 1000 рублей', value: '1000' },
          { text: '200 рублей за нарушение формата отчетности', value: '200' }
        ],
        correct: '20000',
        explanation: 'Правильно: ст. 119 НК — 5% за каждый месяц просрочки. (200 000 × 0,05) × 2 = 20 000 руб.'
      },
      {
        title: 'Задача 2. Опоздание с нулевой декларацией',
        desc: 'ИП сдал декларацию по УСН на 3 месяца позже срока. Налог к уплате — ноль. Какой штраф заплатит ИП?',
        options: [
          { text: 'Минимальный налог 1000 рублей', value: '1000' },
          { text: '200 рублей за нарушение формата отчетности', value: '200' }
        ],
        correct: '1000',
        explanation: 'Правильно: ст. 119 НК — даже при нулевом налоге штраф минимум 1000 руб.'
      },
      {
        title: 'Задача 3. Нарушение формата',
        desc: 'Компания обязана сдавать электронную декларацию, но сдала на бумаге. Сроки не нарушены, налог уплачен вовремя. В каком размере компанию привлекут к ответственности?',
        options: [
          { text: '5% от налога', value: '5percent' },
          { text: '1000 руб.', value: '1000' },
          { text: '200 руб.', value: '200' }
        ],
        correct: '200',
        explanation: 'Правильно: ст. 119.1 НК — фиксированный штраф 200 руб. за нарушение формата.'
      },
      {
        title: 'Задача 4. Опоздание управляющего товариществом',
        desc: 'Управляющий товарищества сдал декларацию на 4 месяца позже срока. Сумма налога — 500 000 руб. В каком размере оштрафуют управляющего?',
        options: [
          { text: '(500000 × 0,05) × 4 = 100 000 рублей', value: '100000' },
          { text: '1000 руб. × 4 = 4000 руб.', value: '4000' },
          { text: '200 руб.', value: '200' }
        ],
        correct: '4000',
        explanation: 'Правильно: для управляющего товарищем особый порядок — 1000 руб. в месяц (п. 2 ст. 119 НК).'
      },
      {
        title: 'Задача 5. Опоздание на 7 месяцев',
        desc: 'Организация сдала декларацию на 7 месяцев позже. Налог — 100 000 руб.',
        options: [
          { text: '(100000 × 0,05) × 7 = 35 000 рублей', value: '35000' },
          { text: '30% от 100 000 = 30 000 руб. (максимум)', value: '30000' },
          { text: '1000 руб.', value: '1000' }
        ],
        correct: '30000',
        explanation: 'Правильно: максимум по ст. 119 НК — 30% от налога. 5% × 7 = 35% > 30%, поэтому 30 000 руб.'
      }
    ];

    const container = document.getElementById('tasksContainer');
    const resetBtn = document.getElementById('resetBtn');
    const checkBtn = document.getElementById('checkBtn');
    const summaryEl = document.getElementById('summary');

    let userAnswers = new Array(tasks.length).fill(null);
    let taskResults = new Array(tasks.length).fill(false);

    function renderTasks() {
      container.innerHTML = '';
      tasks.forEach((task, index) => {
        const taskCard = document.createElement('div');
        taskCard.className = 'task-card';
        taskCard.dataset.index = index;

        const title = document.createElement('div');
        title.className = 'task-title';
        title.textContent = task.title;
        taskCard.appendChild(title);

        const desc = document.createElement('div');
        desc.className = 'task-desc';
        desc.textContent = task.desc;
        taskCard.appendChild(desc);

        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'options';

        task.options.forEach((option, optIdx) => {
          const btn = document.createElement('div');
          btn.className = 'option-btn';
          btn.textContent = option.text;
          btn.dataset.value = option.value;
          btn.dataset.taskIndex = index;
          btn.dataset.optIndex = optIdx;
          
          btn.addEventListener('click', () => {
            if (taskResults[index]) return; // если уже проверено, нельзя менять
            
            // Снимаем выделение со всех кнопок в этой задаче
            optionsDiv.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            userAnswers[index] = option.value;
          });

          optionsDiv.appendChild(btn);
        });

        taskCard.appendChild(optionsDiv);

        const feedbackDiv = document.createElement('div');
        feedbackDiv.className = 'feedback';
        feedbackDiv.id = `feedback-${index}`;
        taskCard.appendChild(feedbackDiv);

        container.appendChild(taskCard);
      });
    }

    function resetAll() {
      userAnswers = new Array(tasks.length).fill(null);
      taskResults = new Array(tasks.length).fill(false);
      
      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.classList.remove('selected');
      });
      
      document.querySelectorAll('.feedback').forEach(el => {
        el.innerHTML = '';
        el.classList.remove('correct', 'incorrect');
      });
      
      summaryEl.innerHTML = 'Выберите ответы для всех задач';
    }

    function checkAll() {
      // Проверим, все ли задачи отвечены
      const unanswered = userAnswers.some(ans => ans === null);
      if (unanswered) {
        const answeredCount = userAnswers.filter(ans => ans !== null).length;
        summaryEl.innerHTML = `⚠️ Отвечено ${answeredCount} из ${tasks.length} задач`;
        return;
      }

      let correctCount = 0;
      
      tasks.forEach((task, index) => {
        const userAns = userAnswers[index];
        const isCorrect = (userAns === task.correct);
        const feedbackEl = document.getElementById(`feedback-${index}`);
        
        taskResults[index] = true; // задача проверена
        
        if (isCorrect) {
          correctCount++;
          feedbackEl.innerHTML = `✅ ${task.explanation}`;
          feedbackEl.classList.add('correct');
          feedbackEl.classList.remove('incorrect');
        } else {
          feedbackEl.innerHTML = `❌ Неправильно. ${task.explanation}`;
          feedbackEl.classList.add('incorrect');
          feedbackEl.classList.remove('correct');
        }
        
        // Блокируем кнопки
        const taskCard = document.querySelector(`.task-card[data-index="${index}"]`);
        taskCard.querySelectorAll('.option-btn').forEach(btn => {
          btn.style.pointerEvents = 'none';
        });
      });

      summaryEl.innerHTML = `🎯 Результат: правильно ${correctCount} из ${tasks.length}`;
    }

    resetBtn.addEventListener('click', resetAll);
    checkBtn.addEventListener('click', checkAll);

    renderTasks();
  })();
</script>
</body>
</html>
