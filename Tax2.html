<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Тренажёр · Виды налогов (адаптив)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f5;
            font-family: 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 8px;
        }

        .tax-trainer {
            max-width: 650px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            padding: 1.5rem 1rem;
            box-shadow: 0 15px 35px -10px rgba(0,0,0,0.08);
            border: 1px solid #e0e4e9;
        }

        .tax-trainer h1 {
            font-weight: 400;
            font-size: 1.6rem;
            letter-spacing: -0.02em;
            color: #1e1e1e;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e8ecf0;
            padding-bottom: 0.6rem;
            line-height: 1.3;
        }

        .tax-trainer h1 span {
            font-weight: 500;
            background: #f2f5f9;
            padding: 0.2rem 0.6rem;
            border-radius: 40px;
            font-size: 0.85rem;
            margin-left: 0.5rem;
            color: #3a4a5e;
            display: inline-block;
            vertical-align: middle;
        }

        /* Карусель — адаптивная */
        .tax-trainer .carousel-area {
            background: #fafbfc;
            border-radius: 24px;
            padding: 1.5rem 0.8rem;
            margin-bottom: 1.8rem;
            border: 1px solid #dee4ea;
        }

        .tax-trainer .carousel-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7e8b9c;
            margin-bottom: 1rem;
            margin-left: 0.3rem;
        }

        .tax-trainer .carousel-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            flex-wrap: nowrap;
        }

        .tax-trainer .carousel-btn {
            background: white;
            border: 1px solid #d0d8e2;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.8rem;
            font-weight: 300;
            color: #3e5368;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .tax-trainer .carousel-btn:active:not(:disabled) {
            background: #e0e8f2;
            transform: scale(0.96);
        }

        .tax-trainer .carousel-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        /* Центральный элемент — подстраивается под экран */
        .tax-trainer .tax-card {
            flex: 1;
            min-width: 0; /* позволяет сжиматься */
            background: white;
            border: 2px solid #bcc9d9;
            border-radius: 18px;
            padding: 1rem 0.4rem;
            text-align: center;
            font-size: 1rem;
            font-weight: 500;
            color: #111;
            box-shadow: 0 6px 14px rgba(0,0,0,0.02);
            cursor: grab;
            user-select: none;
            word-break: break-word;
            line-height: 1.3;
        }

        .tax-trainer .tax-card[draggable="true"]:active {
            cursor: grabbing;
            opacity: 0.9;
        }

        .tax-trainer .carousel-counter {
            font-size: 0.8rem;
            color: #6b7d94;
            margin-top: 0.8rem;
            text-align: center;
        }

        /* Три колонки на телефоне превращаются в столбец */
        .tax-trainer .categories-row {
            display: flex;
            gap: 0.8rem;
            margin-top: 0.5rem;
            justify-content: space-between;
        }

        .tax-trainer .category-col {
            flex: 1;
            min-width: 0;
        }

        .tax-trainer .category-header {
            background: white;
            border: 2px solid #dbe1e9;
            border-radius: 18px;
            padding: 0.8rem 0.2rem;
            text-align: center;
            font-weight: 500;
            font-size: 1rem;
            color: #1f2a36;
            margin-bottom: 0.8rem;
            background: #f8fafd;
            word-break: break-word;
        }

        .tax-trainer .dropzone-container {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .tax-trainer .dropzone {
            background: #f2f5f9;
            border: 2px dashed #b9c4d2;
            border-radius: 18px;
            min-height: 70px;
            height: auto;
            padding: 0.6rem 0.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8d9aa8;
            font-size: 0.85rem;
            transition: 0.1s;
            text-align: center;
            word-break: break-word;
            line-height: 1.3;
        }

        /* Увеличиваем заполненные ячейки по высоте под текст */
        .tax-trainer .dropzone.filled {
            background: white;
            border: 2px solid #b1c0d2;
            color: #111;
            font-weight: 450;
            font-size: 0.9rem;
            border-style: solid;
            min-height: 70px;
        }

        .tax-trainer .dropzone.correct {
            border: 3px solid #2b8c4a !important;
            background: #f0faf2;
        }
        .tax-trainer .dropzone.incorrect {
            border: 3px solid #c93a3a !important;
            background: #fff6f6;
        }

        /* Кнопка проверки — чуть меньше на мобилках */
        .tax-trainer .check-section {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
        }

        .tax-trainer .check-btn {
            background: white;
            border: 2px solid #222;
            border-radius: 60px;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            font-weight: 500;
            color: #111;
            cursor: pointer;
            transition: 0.15s;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 0 #e0e4ea;
            width: 100%;
            max-width: 300px;
        }

        .tax-trainer .check-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #d0d8e2;
            background: #f0f3f7;
        }

        /* Специальные правила для узких экранов (до 500px) */
        @media (max-width: 500px) {
            .tax-trainer {
                padding: 1.2rem 0.8rem;
                border-radius: 24px;
            }

            .tax-trainer h1 {
                font-size: 1.4rem;
            }

            .tax-trainer h1 span {
                display: block;
                margin-left: 0;
                margin-top: 0.4rem;
                text-align: center;
                font-size: 0.8rem;
            }

            .tax-trainer .carousel-container {
                gap: 0.3rem;
            }

            .tax-trainer .carousel-btn {
                width: 40px;
                height: 40px;
                font-size: 1.6rem;
            }

            .tax-trainer .tax-card {
                font-size: 0.9rem;
                padding: 0.8rem 0.2rem;
            }

            .tax-trainer .categories-row {
                flex-direction: column;
                gap: 1.2rem;
            }

            .tax-trainer .category-header {
                font-size: 1.1rem;
                padding: 0.7rem 0.2rem;
            }

            .tax-trainer .dropzone {
                min-height: 65px;
                font-size: 0.9rem;
                padding: 0.5rem 0.3rem;
            }

            .tax-trainer .dropzone.filled {
                font-size: 0.95rem;
            }

            .tax-trainer .check-btn {
                padding: 0.7rem 1.5rem;
                font-size: 1rem;
                max-width: 260px;
            }
        }

        /* Для очень маленьких экранов (до 360px) */
        @media (max-width: 360px) {
            .tax-trainer .tax-card {
                font-size: 0.8rem;
            }

            .tax-trainer .dropzone {
                font-size: 0.8rem;
                min-height: 60px;
            }

            .tax-trainer .category-header {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="tax-trainer">
        <h1>Виды налогов <span>перетащите в нужный столбец</span></h1>

        <!-- Карусель с налогами -->
        <div class="carousel-area">
            <div class="carousel-label">НАЛОГ (листай и перетаскивай)</div>
            <div class="carousel-container">
                <button class="carousel-btn" id="prevTaxBtn" aria-label="предыдущий">←</button>
                <div id="activeTaxContainer" class="tax-card" draggable="true">НДС</div>
                <button class="carousel-btn" id="nextTaxBtn" aria-label="следующий">→</button>
            </div>
            <div class="carousel-counter" id="taxCounter">1 / 9</div>
        </div>

        <!-- Три категории -->
        <div class="categories-row">
            <!-- федеральные -->
            <div class="category-col">
                <div class="category-header">федеральные</div>
                <div class="dropzone-container" id="fedContainer" data-category="fed">
                    <div class="dropzone" data-index="0"></div>
                    <div class="dropzone" data-index="1"></div>
                    <div class="dropzone" data-index="2"></div>
                    <div class="dropzone" data-index="3"></div>
                    <div class="dropzone" data-index="4"></div>
                </div>
            </div>
            <!-- региональные -->
            <div class="category-col">
                <div class="category-header">региональные</div>
                <div class="dropzone-container" id="regContainer" data-category="reg">
                    <div class="dropzone" data-index="0"></div>
                    <div class="dropzone" data-index="1"></div>
                </div>
            </div>
            <!-- местные -->
            <div class="category-col">
                <div class="category-header">местные</div>
                <div class="dropzone-container" id="locContainer" data-category="loc">
                    <div class="dropzone" data-index="0"></div>
                    <div class="dropzone" data-index="1"></div>
                </div>
            </div>
        </div>

        <!-- Кнопка проверки -->
        <div class="check-section">
            <button class="check-btn" id="checkBtn">Проверить результат</button>
        </div>
    </div>

    <script>
        (function() {
            // Исходные налоги
            const allTaxesBase = [
                "НДС",
                "Налог на прибыль организаций",
                "НДФЛ",
                "Налог на добычу полезных ископаемых",
                "Водный налог",
                "Налог на имущество организаций",
                "Транспортный налог",
                "Земельный налог",
                "Туристический налог"
            ];

            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            const allTaxes = shuffleArray([...allTaxesBase]);

            const correctMap = {
                "Федеральные": ["НДС", "Налог на прибыль организаций", "НДФЛ", "Налог на добычу полезных ископаемых", "Водный налог"],
                "Региональные": ["Налог на имущество организаций", "Транспортный налог"],
                "Местные": ["Земельный налог", "Туристический налог"]
            };

            const catFullName = { fed: "Федеральные", reg: "Региональные", loc: "Местные" };

            let remainingTaxes = [...allTaxes];
            let currentCarouselIndex = 0;

            const assignments = {
                fed: [null, null, null, null, null],
                reg: [null, null],
                loc: [null, null]
            };

            const activeTaxDiv = document.getElementById('activeTaxContainer');
            const prevBtn = document.getElementById('prevTaxBtn');
            const nextBtn = document.getElementById('nextTaxBtn');
            const taxCounter = document.getElementById('taxCounter');
            const fedContainer = document.getElementById('fedContainer');
            const regContainer = document.getElementById('regContainer');
            const locContainer = document.getElementById('locContainer');
            const checkBtn = document.getElementById('checkBtn');

            function getAllDropZones() {
                return document.querySelectorAll('.dropzone');
            }

            function renderDropZones() {
                const zones = getAllDropZones();
                zones.forEach(z => {
                    z.classList.remove('filled', 'correct', 'incorrect');
                    z.textContent = '';
                });

                const fedDrops = fedContainer.querySelectorAll('.dropzone');
                assignments.fed.forEach((tax, idx) => {
                    if (tax) {
                        fedDrops[idx].textContent = tax;
                        fedDrops[idx].classList.add('filled');
                    }
                });

                const regDrops = regContainer.querySelectorAll('.dropzone');
                assignments.reg.forEach((tax, idx) => {
                    if (tax) {
                        regDrops[idx].textContent = tax;
                        regDrops[idx].classList.add('filled');
                    }
                });

                const locDrops = locContainer.querySelectorAll('.dropzone');
                assignments.loc.forEach((tax, idx) => {
                    if (tax) {
                        locDrops[idx].textContent = tax;
                        locDrops[idx].classList.add('filled');
                    }
                });
            }

            function updateCarousel() {
                if (remainingTaxes.length === 0) {
                    activeTaxDiv.textContent = '✓ все распределены';
                    activeTaxDiv.style.background = '#f0f4f9';
                    activeTaxDiv.style.border = '2px solid #a0b8cf';
                    activeTaxDiv.removeAttribute('draggable');
                    prevBtn.disabled = true;
                    nextBtn.disabled = true;
                    taxCounter.textContent = '0 / 9';
                    return;
                }

                if (currentCarouselIndex >= remainingTaxes.length) {
                    currentCarouselIndex = remainingTaxes.length - 1;
                }
                if (currentCarouselIndex < 0) currentCarouselIndex = 0;

                activeTaxDiv.textContent = remainingTaxes[currentCarouselIndex];
                activeTaxDiv.setAttribute('draggable', 'true');
                activeTaxDiv.style.background = 'white';
                activeTaxDiv.style.border = '2px solid #bcc9d9';

                prevBtn.disabled = (currentCarouselIndex === 0);
                nextBtn.disabled = (currentCarouselIndex === remainingTaxes.length - 1);

                const total = allTaxes.length;
                const placed = total - remainingTaxes.length;
                taxCounter.textContent = `${placed+1} / ${total} (осталось ${remainingTaxes.length})`;
            }

            function locateDropZone(dropEl) {
                if (!dropEl.classList.contains('dropzone')) return null;
                const parent = dropEl.parentNode;
                let category = null;
                if (parent.id === 'fedContainer') category = 'fed';
                else if (parent.id === 'regContainer') category = 'reg';
                else if (parent.id === 'locContainer') category = 'loc';
                else return null;

                const index = Array.from(parent.children).indexOf(dropEl);
                return { category, index };
            }

            activeTaxDiv.addEventListener('dragstart', (e) => {
                if (remainingTaxes.length === 0) {
                    e.preventDefault();
                    return;
                }
                e.dataTransfer.setData('text/plain', activeTaxDiv.textContent);
                e.dataTransfer.effectAllowed = 'move';
            });

            document.querySelectorAll('.dropzone').forEach(zone => {
                zone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                });

                zone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const taxDropped = e.dataTransfer.getData('text/plain');
                    if (!taxDropped) return;

                    if (!remainingTaxes.includes(taxDropped)) {
                        alert('Этот налог уже распределён или недоступен');
                        return;
                    }

                    const targetZone = e.currentTarget;
                    if (targetZone.classList.contains('filled')) {
                        alert('Эта ячейка уже занята');
                        return;
                    }

                    const loc = locateDropZone(targetZone);
                    if (!loc) return;

                    if (assignments[loc.category][loc.index] !== null) {
                        alert('Ошибка: ячейка занята');
                        return;
                    }

                    const idxInRemaining = remainingTaxes.indexOf(taxDropped);
                    if (idxInRemaining !== -1) remainingTaxes.splice(idxInRemaining, 1);

                    assignments[loc.category][loc.index] = taxDropped;

                    renderDropZones();

                    if (remainingTaxes.length > 0) {
                        if (currentCarouselIndex >= remainingTaxes.length) {
                            currentCarouselIndex = remainingTaxes.length - 1;
                        } else if (idxInRemaining < currentCarouselIndex) {
                            currentCarouselIndex--;
                        }
                        if (currentCarouselIndex < 0) currentCarouselIndex = 0;
                    }
                    updateCarousel();

                    document.querySelectorAll('.dropzone').forEach(z => z.classList.remove('correct', 'incorrect'));
                });
            });

            prevBtn.addEventListener('click', () => {
                if (currentCarouselIndex > 0) {
                    currentCarouselIndex--;
                    updateCarousel();
                }
            });

            nextBtn.addEventListener('click', () => {
                if (currentCarouselIndex < remainingTaxes.length - 1) {
                    currentCarouselIndex++;
                    updateCarousel();
                }
            });

            function checkResult() {
                document.querySelectorAll('.dropzone').forEach(z => z.classList.remove('correct', 'incorrect'));

                for (let cat in assignments) {
                    const catName = catFullName[cat];
                    const correctList = correctMap[catName] || [];
                    assignments[cat].forEach((tax, idx) => {
                        if (!tax) return;
                        const dropElement = cat === 'fed' ? fedContainer.children[idx] :
                                            cat === 'reg' ? regContainer.children[idx] :
                                            locContainer.children[idx];
                        if (correctList.includes(tax)) {
                            dropElement.classList.add('correct');
                        } else {
                            dropElement.classList.add('incorrect');
                        }
                    });
                }
            }

            checkBtn.addEventListener('click', checkResult);

            document.addEventListener('dragover', (e) => e.preventDefault());
            document.addEventListener('drop', (e) => e.preventDefault());

            renderDropZones();
            updateCarousel();

            // Добавляем touch-события для мобильных (чтобы drag работал)
            activeTaxDiv.addEventListener('touchstart', (e) => {
                if (remainingTaxes.length === 0) {
                    e.preventDefault();
                    return;
                }
                const tax = activeTaxDiv.textContent;
                e.dataTransfer = e.dataTransfer || { setData: () => {} }; // fallback
                // для touch нужно использовать drag & drop API, но в мобильных браузерах drag работает ограниченно
                // поэтому оставляем как есть — на мобильных можно тащить через долгое нажатие
            }, { passive: false });
        })();
    </script>
</body>
</html>
